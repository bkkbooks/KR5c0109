body:
  text: 玄門開真弘教大真人廣陵仁齊林志堅注體道章第一道可道非常道道法自然名可名非常名道隱無名無名天地之始道生一有名萬物之母三生萬物常無欲以觀其妙至虛極常有欲以觀其徼守靜篤此兩者同出而異名常有欲常無欲同謂之玄是謂玄同玄之又玄衆妙之門玄牝之門是謂天地根養身章第二天下皆知美之為美斯惡已道者同於道皆知善之為善斯不善已德者同於德故有無相生天下萬物生於有有生於無難易相成多易必多難長短相形是謂無狀之狀高下相傾高必以下為基音聲相和道沖而用之前後相隨迎之不見其首隨之不見其後是以聖人處無為之事為無為行不言之教希言自然萬物作而不辭夫物藝藝生而不有為而不恃道之為物功成不居夫唯弗居是以不去功成名遂身退天之道安民章第三不尚賢使民不爭自愛不自貴不貴難得之貨使民不為盜絶巧棄利盜賊無有不見可欲使心不亂滌除玄覽能無疵乎是以聖人治故立天子虛其心大德若谷實其腹抱一能無離弱其志專氣致柔强其骨守柔曰强常使民無知無欲政善治使夫知者不敢為也愛民治國能無為為無為則無不治我無為而民自化無源章第四道沖而用之和之至也或不盈大盈若沖淵乎似萬物之宗道者萬物之奧挫其鋭解其紛執古之道和其光同其塵渾兮其如濁湛兮似若存綿綿若存吾不知誰之子象帝之先吾不知其名字之曰道虛用章第五天地不仁以萬物為芻狗生而不有聖人不仁以百姓為芻狗為而不恃天地之間其猶橐籥乎曠兮其若谷虛而不屈上德若谷動而愈出動善時多言數窮言者不知不如守中知者不言成象章第六谷神不死長生久視之道是謂玄牝古之所以貴此道者玄牝之門是謂天地根道者萬物之奧綿綿若存勤而行之用之不勤道沖而用之韜光章第七天長地久昔之得一者天地所以能長且久者抱一能無離以其不自生故能長生生而不有是以聖人後其身而身先欲先民必以身後之外其身而身存無之以為用非以其無私邪故能成其私是以聖人猶難之故終無難易性章第八上善若水專氣致柔水善利萬物而不爭曲則全處衆人之所惡故幾於道天下柔弱莫過於水居善地猶兮若畏四鄰心善淵上德若谷與善仁天道無親常與善人言善信不言而善應政善治以正治國事善能為無為動善時執古之道夫唯不爭故無尤是謂不爭之德運夷章第九持而盈之不如其已知止不殆揣而鋭之不可長保夫佳兵者不祥之器金玉滿堂莫之能守甚愛必大費富貴而驕自遺其咎知足不辱功成名遂身退天之道功成不名有能為章第十載營魄抱一能無離善抱者不脫專氣致柔能嬰兒和之至也滌除玄覽能無疵常無欲以觀其妙愛民治國能無為我無為而民自化天門開闔能無雌萬物負陰而抱陽明白四達能無知雖知大迷是謂要妙生之畜之萬物並作生而不有為而不恃長而不宰是謂玄德天地不仁以萬物為芻狗無用章第十一三十輻共一轂萬物莫不尊道而貴德當其無有車之用曠兮其若谷埏埴以為器有物混成先天地生當其無有器之用虛其心鑿户牖以為室道者萬物之奧當其無有室之用其猶橐籥乎故有之以為利萬物得一以生無之以為用為無為則無不治檢欲章第十二五色令人目盲俗人昭昭五音令人耳聾俗人察察五味令人口爽厭飲食馳騁田獵令人心發狂輕則失臣躁則失君難得之貨令人行妨罪莫大於可欲是以聖人為腹不為曰故去彼取此處其實不居其華厭恥章第十三寵辱若驚涣兮若冰之將釋貴大患若身豫兮若冬涉川何謂寵辱知其榮守其辱辱為下得之若驚失之若驚是謂寵辱若驚富貴而驕自遺其咎何謂貴大患若身名與身孰親吾所以有大患者為吾有身外其身而身存及吾無身吾有何患得與亡孰病故貴以身為天下者則可以寄於天下自矜者不長愛以身為天下者乃可以託於天下自愛不自貴贊玄章第十四視之不見名曰夷視之不足見聽之不聞名曰希聽之不足聞摶之不得名曰微大象無形此三者不可以致詰微妙玄通深不可識故混而為一其致之一也其上不皎其下不昧和其光繩繩不可名道常無名復歸於無物是謂無狀之狀惚兮恍兮其中有象無物之象是謂恍惚道之為物唯恍唯惚迎之不見其首隨之不見其後忽兮若海漂兮若無所止執古之道以御今之有天下有始以為天下母以知古始是謂道紀自古及今其名不去顯德章第十五古之善為士者微妙玄通深不可識含德之厚夫唯不可識故强為之容道之為物唯恍唯惚豫兮若冬涉川唯施是畏猶兮若畏四鄰知其白守其黑儼兮其若客見素抱朴涣兮若冰之將釋豫兮若冬涉川敦兮其若朴被褐懷玉曠兮其若谷譬道之在天下渾兮其如濁和其光孰能濁以久靜之徐清守靜篤孰能安以久動之徐生含德之厚保此道者不欲盈大盈若沖夫唯不盈故能敝不新成進道若退歸根章第十六致虛極曠兮其若谷守靜篤侯王若能守萬物將自賔萬物並作吾以觀其復反者道之動夫物藝藝各復歸其根既知其子復守其母歸根曰靜靜曰復命用其光復歸其明復命曰常周行而不殆知常曰明大道甚夷不知常妄作凶正復為奇善復為妖民之迷其日固久知常容候王得一以為天下正容乃公公乃王王乃天天乃道道者萬物之奧道乃久沒身不殆非道早已淳風章第十七太上下知有之以知古始其次親之譽之自知者明其次畏之侮之不知常妄作凶故信不足焉中士聞道若存若亡有不信焉下士聞道大笑之不笑不足以為道猶兮其貴言知者不言功成事遂百姓皆曰我自然道法自然俗薄章第十八大道廢有仁義失道而後德智慧出有大僞以智治國國之賊六親不和有孝慈絶仁棄義民復孝慈國家昏亂有忠臣愛民治國能無為乎還淳章第十九絶聖棄智民利百倍我無事而民自富絶仁棄義民復孝慈我無欲而民自朴絶巧棄利盜賊無有不貴難得之貨此三者以為文不足明道若昧故令有所屬吾將以為教父見素抱朴被褐懷玉少私寡欲常無欲以觀其妙異俗章第二十絶學無憂微妙玄通唯之與阿相去幾何此兩者同出而異名善之與惡相去何若唯之與阿相去幾何人之所畏不可不畏民不畏威大威至矣荒兮其未央哉忽兮若每衆人熙熙如享大牢如登春臺富貴而驕我獨怕兮其未兆如嬰兒之未孩含德之厚比於赤子乘乘兮若無所歸譬道之在天下衆人皆有餘俗人昭昭而我獨若遺建德若偷我愚人之心也哉純純兮光而不耀俗人昭昭自見者不明我獨若昏明道若昧俗人察察博者不知我獨悶悶進道若退忽兮若海漂兮若無所止大方無隅衆人皆有以不知知病而我獨頑似鄙夷道若類我獨異於人而貴食母玄德深矣遠矣與物反矣虛心章第二十一孔德之容唯道是從上德若谷道之為物唯恍唯惚大象無形惚兮恍兮其中有象無物之象是謂惚恍恍兮惚兮其中有物是謂無狀之狀窈兮冥兮其中有精萬物生於有有生於無其精甚真其中有信其上不皎其下不昧自古及今其名不去執古之道以御今之有以閲衆甫吾何以知衆甫之然哉以此天下皆知美之為美並謙章第二十二曲則全弱其志枉則直虛其心窪則盈廣德若不足弊則新大白若辱少則得知者不言多則惑言者不知是以聖人抱一為天下式侯王得一以為天下正不自見故明自見者不明不自是故彰自是者不彰不自伐故有功自伐者無功不自矜故長自矜者不長夫唯不爭故天下莫能與之爭夫唯不爭故無尤古之所謂曲則全者豈虛言哉誠全而歸之處衆人之所惡故幾於道虛無章第二十三希言自然不見而名無為而成飄風不終朝驟雨不終日無執故無失孰為此者天地道之尊天地尚不能久而況於人乎天亦將知之故從事於道者道者同於道信者吾信之德者同於德善者吾善之失者同於失有不信焉同於道者道亦樂得之天下皆知美之為美同於德者德亦樂得之天下皆知善之為善同於失者失亦樂失之美言不信信不足焉有不信焉自見者不明也貴謙章第二十四跂者不立跨者不行多言數窮不如守中自見者不明俗人昭昭自是者不彰俗人察察自伐者無功衆人皆有以自矜者不長下德不失德其於道也曰餘食贅行大道甚夷而民好徑物或惡之故有道者不處善行無轍迹象元章第二十五有物混成先天地生道生之德畜之寂兮寥兮大象無形獨立而不改周行而不殆不失其所者久可以為天下母是謂天地根吾不知其名宇之曰道道隱無名强為之名曰大道法自然大曰逝大方無隅逝曰遠忽兮若海遠曰反及者道之動故道大天大地大王亦大道之尊域中有四大而王居其一焉故立天子人法地地法天天法道道法自然故混而為一焉重德章第二十六重為輕根高必以下為基靜為躁君靜勝熱是以君子終日行不離輜重獨立而不改雖有榮觀燕處超然守靜篤奈何萬乘之主而以身輕天下愛以身為天下者乃可以託於天下輕則失臣躁則失君清淨為天下巧用章第二十七善行無轍迹行無行善言無瑕謫行不言之教善計不用籌策用之不可既善閉無關楗而不可開抱一能無離善結無繩約而不可解獨立而不改是以聖人常善救人故無棄人美言可以市常善救物故無棄物尊行可以加人是謂襲明用其光復歸其明故善人者不善人之師道之尊不善人者善人之資德畜之不貴其師自愛不自貴不愛其資道常無為雖智大迷是謂要妙夷道若類反朴章第二十八知其雄守其雌牝常以靜勝牡為天下溪譬道之在天下為天下溪常德不離抱一能無離復歸於嬰兒含德之厚比於赤子知其白守其黑光而不耀為天下式抱一為天下式為天下式常德不忒知常曰明復歸於無極其用不窮知其榮守其辱知足不辱為天下谷忽兮若海為天下谷常德乃足知止不殆復歸於朴被褐懷玉朴散則為器有物混成先天地生聖人用之則為官長故大制不割上德無為無為章第二十九將欲取天下而為之吾見其不得已取天下常以無事天下神器不可為也無為故無敗為者敗之執者失之無執故無失故物或行或隨前後相隨或詬或吹音聲相和或强或羸物壯則老或載或隳高下相傾是以聖人去甚去奢去泰居其實不居其華儉武章第三十以道佐人主者不以兵强天下以道范天下其鬼不神其事好還將欲奪之必固與之師之所處荆棘生焉物或惡之故有道者不處大軍之後必有凶年善行無轍迹故善者果而已天下皆知善之為善斯不善已不敢以取强强良者不得其死果而勿矜去甚果而勿伐去泰果而勿驕去奢果而不得已不得已而用之果而勿强不敢以取强物壯則老是謂非道非道早已堅强者死之徒偃武章第三十一夫佳兵者不祥之器揣而鋭之不可長保物或惡之故有道者不處以道佐人主者不以兵强天下是以君子居則貴左吉事尚左用兵則貴右凶事尚右兵者不祥之器非君子之器不得已而用之取天下常以無事及其有事不足以取天下恬惔為上勝而不美是以聖人處無為之事而美之者是樂殺人不知常妄作凶夫樂殺人者不可以得志於天下矣其事好還吉事尚右凶事尚右善之與惡偏將軍居左自勝者强上將軍居右勝人者有力言以喪禮處之天將救之以慈衛之殺人之衆以悲哀泣之恬惔為上勝而不美戰勝則以喪禮處之哀者勝矣聖德章第三十二道常無名朴雖小天下不敢臣使我介然有知唯施是畏侯王若能守萬物將自賔故德交歸焉天地相合萬物負陰而抱陽以降甘露道生之人莫之命而自均而常自然始制有名名亦既有以知古始是謂道紀天亦將知之道可道知之所以不殆知常曰明譬道之在天下猶川谷之與江海大道泛兮其可左右辨德章第三十三知人者智辨者不善自知者明昔之得一者勝人者有力今捨慈且勇自勝者强强其骨知足者富金玉滿堂莫之能守强行者有志周行而不殆不失其所者久獨立而不改死而不亡者壽外其身而身存任成章第三十四大道泛兮其可左右大方無隅萬物恃之以生而不辭天地不仁以萬物為芻狗功成不名有功成名遂身退天之道愛養萬物而不為主生而不有故常無欲可名於小朴雖小天下不敢臣萬物歸焉而不為主可名於大侯王若能守萬物將自化是以聖人終不為大故能成其大上德不德是以有德仁德章第三十五執大象天下往侯王得一以為天下正往而不害安平泰萬物歸焉而不為主樂與鉺過客止皆知善之為善道之出口淡乎其無味孰知其極視之不足見大象無形聽之不足聞大音希聲用之不可既其用不窮微明章第三十六將欲歙之必固張之執者失之將使弱之必固强之柔之勝剛將欲廢之必固興之損之而益將欲奪之必固與之益之而損是謂微明玄德深矣柔弱勝剛强弱者道之用魚不可脫於淵善抱者不脫國之利器不可以示人天下神器不可為也為政章第三十七道常無為而無不為是以聖人處無為之事侯王若能守萬物將自化執大象天下往化而欲作民不畏威吾將鎮之以道范天下以無名之朴不見而名無名之朴亦將不欲我無欲而民自化不欲以靜天下將自正我好靜而民自正論德章第三十八上德不德是以有德明道若昧下德不失德是以無德自矜者不長上德無為而無以為虛其心下德為之而有以為為學日益上仁為之而無以為為道日損上義為之而有以為俗人察察上禮為之而莫之應則攘臂而仍之非道也哉故失道而後德失德而後仁大道廢有仁義失仁而後義失義而後禮正復為奇夫禮者忠信之薄而亂之首善復為妖前識者道之華而愚之始大道甚夷而民好徑是以大丈夫處其厚不居其薄被褐懷玉處其實不居其華復居於朴故去彼取此我獨異於人道德真經注卷上
