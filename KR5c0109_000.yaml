body:
  text: 夫正經何以爲序乎曰道者生萬物之宗祖判天地之根元道在天地之先生天生地自古長存之道故道之尊爲序之首道生一一生二陰陽既判輕清爲天重濁爲地故天之道次之二生三陰陽升降中間成人故聖人之道次之三才備矣是以修身爲本故蓋聞善攝生者次之修身以至於治國平天下故治大國若烹小鮮次之用之則充乎天地之間卷之則藏乎六合之内事有終始物有本末以正經故爲序之而已矣
  hash: sha256:c84bb2e83e0bb3138b2153b9e89c7ca830385e8eb638357f4e22c674f28dd227
