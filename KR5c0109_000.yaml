front:
  text: 道德經註序絲一道尊德貴天地覆載無窮古聖先賢經典註釋良多出生入死名爲修身之法無爲而化深乃治世之方明心見性之人乃知谷神不死一章最佳治國安民之士故解以正治國一篇深妙人生於世莫過如此余因閒暇之時靜觀聖賢之妙典豈悟造化之淵源愚意忘自以假太上老君道德經典始終相因以正經註于正經之下以經解經略知經意豈能表裏相通熟讀玩味自然解悟正經之玄妙入道之門户立德之根基可謂明矣司馬光曰非常之道故非常人之所知朱文公曰道而可道則非常道名而可名則非常名余常切思自見者不明自是者不彰愚意不避僣越之愆互相引證豈爲序註何能盡善也歟候來之君子見之勿吝必須删削以求斤正深爲良矣元至正歲次甲午孟夏吉日廣陵仁齋林志堅序道之尊德之貴而常自然道可道非常道吾不知其名字之曰道名可名非常名道隱無名無名天地之始天下有始以爲天下母一生二二生三三生萬物萬物負陰而抱陽沖氣以爲和知和曰常知常容容乃公公乃王王乃天天乃道道法自然天之道利而不害其猶張弓乎高者抑之下者舉之不足者與之有餘者損之人之道則不然孰能有餘以奉天下唯有道者萬物作而不辭生而不有爲而不恃長而不宰是謂玄德聖人之道爲而不爭抱一爲天下式美言可以市尊行可以加人人之不善何棄之有常善救人故無棄人常善救物故無棄物是謂襲明故立天子置三公雖有拱璧以先駟馬不如坐進此道功成名遂身退天之道蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兒無投其角虎無所措爪兵無所容其刃夫何故以其無死地專氣致柔能嬰兒塞其兊閉其門虚其心實其腹弱其志强其骨是謂深根固蔕長生乆視之道治大國若烹小鮮大者宜爲下不敢以取强以道蒞天下其鬼不神以道佐人主者不以兵强天下其事好還夫佳兵者不祥之器非君子之器不得已而用之用兵有言吾不敢爲主而爲客不敢進寸而退尺夫何故舍後且先者死矣故聖人云我無爲而民自化我無事而民自富我無欲而民自樸我好靜而民自正不欲以靜天下將自定
