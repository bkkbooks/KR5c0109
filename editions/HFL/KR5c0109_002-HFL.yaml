front:
  text: 道德眞經註卷下絲二玄門開眞弘教大眞人廣陵仁齋林志堅註法本章第三十九昔之得一者道可道天得一以清道生一地得一以寧以知古始神得一以靈太上下知有之谷得一以盈道生之萬物得一以生德畜之侯王得一以爲天下正抱一爲天下式其致之一也道者萬物之奥天無以清將恐裂大道廢地無以寧將恐發不知常神無以靈將恐歇非道早已谷無以盈將恐竭自遺其咎萬物無以生將恐滅是謂非道侯王無以貴高將恐蹷富貴而驕故貴以賤爲本大者宜爲下高必以下爲基善用人者爲下是以侯王自謂孤寡不轂上德不德此其以賤爲本邪故貴以賤爲本非乎故致數車無車光而不耀不欲琭琭如玉落落如石不可得而貴亦不可得而賤去用章第四十反者道之動各復歸其根弱者道之用專氣致柔天下萬物生於有有生於無道生一一生二二生三三生萬物同異章第四十一上士聞道勤而行之古之善爲道者中士聞道若存若亡孰知其極下士聞道大笑之不笑不足以爲道民之迷故建言有之故令有所屬明道若昧光而不耀夷道若類知其白守其黑進道若退大成若缺上德若谷虚其心大白若辱大直若屈廣德若不足大盈若沖建德若偷大辯若訥質眞若渝大巧若拙大方無隅大道汎兮其可左右大器晩成合抱之木生於毫末太音希聲希言自然大象無形視之不見名曰夷道隱無名不見而名夫唯道善貸且成道者萬物之奥
