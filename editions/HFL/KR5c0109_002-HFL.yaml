body:
  text: 道化章第四十二道生一天下有始以爲天下母一生二以知古始二生三道生之三生萬物萬物得一以生萬物負陰而抱陽天門開闔沖氣以爲和專氣致柔人之所惡唯孤寡不轂而王公以爲稱大成若缺故物或損之而益益之而損前後相隨人之所教我亦教之道者同於道强梁者不得其死堅强者死之徒吾將以爲教父使夫知者不敢爲也偏用章第四十三天下之至柔馳騁天下之至堅天下柔弱莫過於水而攻堅强者莫知能勝無有入無間有無相生吾是以知無爲之有益是以聖人處無爲之事不言之教無爲之益天下希及之知我者希則我者貴立戒章第四十四名與身孰親不可得而親身與貨孰多不可得而利得與亡孰病以身觀身是故甚愛必大費爲者敗之多藏必厚亡執者失之知足不辱禍莫大於不知足知止不殆可以長乆知之所以不殆洪德章第四十五大成若缺其用不弊上德不德是以有德大盈若沖其用不窮道沖而用之大直若屈曲則全大巧若拙大白若辱大辯若訥知者不言躁勝寒靜勝熱爲無爲則無不治清淨爲天下正不欲以靜天下將自正儉欲章第四十六天下有道却走馬以糞以道佐人主者不以兵强天下天下無道戎馬生於郊師之所處荆棘生焉罪莫大於可欲甚愛必大費禍莫大於不知足知止不殆咎莫大於欲得得與亡孰病故知足之足常足矣知足者富鑒遠章第四十七不出户知天下不行而知不窺牖見天道微妙玄通其岀彌遠其知彌少多則惑是以聖人不行而知明白四達不見而名無爲而成功成事遂百姓皆曰我自然忘知章第四十八爲學日益博者不知爲道日損知者不博損之又損以至於無爲致虚極無爲而無不爲爲無爲故取天下常以無事以正治國及其有事不足以取天下國家昏亂有忠臣任德章第四十九聖人無常心以百姓心爲心有德司契善者吾善之不善者吾亦善之德善皆知善之爲善信者吾信之不信者吾亦信之德信皆知美之爲美聖人在天下怵怵爲天下渾其心大道汎兮百姓注其耳目俗人昭昭聖人皆孩之含德之厚比於赤子貴生章第五十出生入死善之與惡生之徒十有三柔弱者生之徒死之徒十有三堅强者死之徒民之生動入死地亦十有三夫無以生爲者是賢於貴生夫何故以其生生之厚民之輕死以其求生之厚是以輕死蓋聞善攝生者陸行不遇兕虎含德之厚入軍不被甲兵兵無所容其刃兕無所投其角攫鳥不摶虎無所措爪猛獸不據兵無所容其刃天將救之以慈衛之夫何故以其無死地天道無親常與善人養德章第五十一道生之德畜之萬物得一以生物形之勢成之有物混成是以萬物莫不尊道而貴德道者萬物之奥道之尊德之貴夫莫之命而常自然道法自然故道生之德畜之執古之道長之育之生之畜之成之熟之道生之養之覆之以輔萬物之自然生而不有爲而不恃長而不宰是謂玄德天之道利而不害歸元章第五十二天下有始以爲天下母有名萬物之母既得其母以知其子以知古始既知其子復守其母各復歸其根没身不殆天長地乆塞其兊閉其門不見可欲終身不勤若亡若存開其兊濟其事俗人察察終身不救非道早巳見小曰明微妙玄通守柔曰强和之至也用其光復歸其明其用不弊無遺身殃是謂襲常可以有國益證章第五十三使我介然有知行於大道吾言甚易知甚易行唯施是畏天下莫能知莫能行大道甚夷而民好徑信言不美朝甚除甚愛必大費田甚蕪倉甚虚師之所處荆棘生焉服文采道之華而愚之始帶利劍夫佳兵者不祥之器厭飲食五味令人口爽財貨有餘是謂盜誇非道也哉故有道者不處修觀章五十四善建者不拔獨立而不改善抱者不脱抱一能無離子孫祭祀不輟長生乆視之道修之於身其德乃眞道生之修之於家其德乃餘含德之厚修之於鄉其德乃長德畜之修之於國其德乃豐侯王得一以爲天下正修之於天下其德乃普大道汎兮故以身觀身名與身孰親以家觀家六親不和有孝慈以鄉觀鄉善之與惡以國觀國國家昏亂有忠臣以天下觀天下故貴以身爲天下者則可以寄於天下愛以身爲天下者乃可以託於天下何以知天下之然哉以此是以聖人不行而知玄符章第五十五含德之厚比於赤子專氣致柔能嬰兒毒蟲不螫猛獸不據攫鳥不搏故有道者不處骨弱筋柔而握固虚其心實其腹未知牝牡之合而䘒作精之至也故混而爲一終日號而不嗌和之至也道沖而用之知和曰常知常曰明是謂配天古之極益生曰祥無爲之益心使氣曰强强其骨物壯則老是謂不道不道早已故堅强者死之徒玄德章第五十六知者不言言者不知希言自然塞其兊閉其門不見可欲挫其鋭解其紛夫唯不爭故無尤和其光同其塵光而不耀是謂玄同執古之道故不可得而親亦不可得而踈欲不欲不貴難得之貨不可得而利亦不可得而害生而不有爲而不恃不可得而貴亦不可得而賤自愛不自貴故爲天下貴知我者希則我者貴淳化章第五十七以正治國不以智治國國之福以奇用兵以智治國國之賊以無事取天下取天下常以無事吾何以知其然哉以此以國觀國天下多忌諱而民彌貧民之饑以其上食税之多民多利器國家滋昏難得之貨令人行妨民多伎巧竒物滋起智慧出有大僞法令滋彰盜賊多有天下多忌諱而民彌貧故聖人云我無爲而民自化執大象天下往我無事而民自富愛民治國能無爲我好靜而民自正爲無爲則無不治我無欲而民自朴無名之朴亦將不欲順化章第五十八其政悶悶其民諄諄以正治國其政察察其民缺缺法令滋彰盜賊多有禍兮福之所倚或損之而益福兮禍之所伏益之而損孰知其極莫知其極其無正邪非以其無私邪正復爲奇善復爲妖大道甚夷而民好徑民之迷其日固乆衆人熙熙如享大牢是以聖人方而不割廉而不害長而不宰直而不肆光而不耀含德之厚守道章第五十九治人事天莫若嗇保此道者夫唯嗇是謂早復各復歸其根早復謂之重積德玄德深矣重積德則無不克其用不窮無不克則莫知其極用之不可既莫知其極可以有國故能長生有國之母可以長乆道乃乆是謂深根固蔕長生乆視之道天長地乆居位章第六十治大國若烹小鮮其致悶悶其民諄諄以道蒞天下其鬼不神上德不德非其鬼不神和其光其神不傷人愛民治國非其神不傷人不敢以取强聖人亦不傷人我無爲而民自化夫兩不相傷故德交歸焉執大象天下往謙德章第六十一大國者下流大者宜爲下天下之交窪則盈天下之牝牝常以靜勝牡知其雄守其雌以靜爲下以其善下之故能爲百谷王故大國以下小國則取小國不自矜故長小國以下大國則取大國曲則全或下以取勝人者有也或下而取道法自然大國不過欲兼畜人愛養萬物而不爲主小國不過欲入事人事善能此兩者各得其所欲其致之一也大者宜爲下善用人者宜下爲道章第六十二道者萬物之奥萬物莫不尊道而貴德善人之寳天得一以清不善人之所保道生之德畜之美言可以市聖人不積既以爲人己愈有尊行可以加人常善救人人之不善何棄之有故善人者不善人之師故立天子置三公是以聖人雖有拱璧以先駟馬不如坐進此道道可道非常道古之所以貴此道者玄之又玄何必日以求得有罪以免邪知之所以不殆故爲天下貴道之尊恩始章第六十三爲無爲無爲之益天下希及之事無事我無事而民自富味無味道之出口淡乎其無味大小多少報怨以德德畜之圖難於其易多易必多難爲大於其細合抱之木生於毫末天下難事必作於易難易相成天下大事必作於細使我介然有知行於大道是以聖人終不爲大故能成其大不自矜故長夫輕諾必寡信不知知病多易必多難善言甚易知甚易行天下莫能知莫能行是以聖人猶難之故終無難天下難事必作於易守微章第六十四其安易持恬惔爲上其未兆易謀爲之於未有其脆易破堅强者死之徒其微易散爲道日損爲之於未有治之於未亂是以聖人下行而知合抱之木生於毫末天下大事必作於細九層之臺起於累土高必以下爲基千里之行始於足下爲大於其細爲者敗之執者失之將欲奪之必固與之聖人無爲故無敗無執故無失爲無爲民之從事常於幾成而敗之爲者敗之慎終如始則無敗事以守則固是以聖人欲不欲不貴難得之貨不欲琭琭如玉學不學復衆人之所過居其實不居其華以輔萬物之自然而不敢爲道常無爲淳德章第六十五古之善爲道者非以明民將以愚之含德之厚民之難治以其智多以其上之有爲是以難治故以智治國國之賊其政察察其民缺缺不以智治國國之福其政悶悶其民諄諄知此兩者亦楷式知其白守其黑爲天下式常知楷式是謂玄德知常曰明玄德深矣遠矣玄之又玄與物反矣我獨異於人然後乃至於大順故取天下常以無事後己章第六十六江海所以能爲百谷王者上德若谷以其善下之故能爲百谷王大國者下流是以聖人欲上民必以言下之不自矜故長欲先民必以身後之後其身而身先是以聖人處上而民不重不尚賢使民不爭處前而民不害自愛不自貴是以天下樂推而不厭皆知美之爲美以其不爭故天下莫能與之爭夫唯不爭故無尤三寳章第六十七天下皆謂我道大似不肖明道若昧夫唯大故似不肖光而不耀若肖乆矣其細也道之爲物唯恍唯惚夫我有三寳寳而持之生而不有爲而不恃長而不宰一曰慈二曰儉三曰不敢爲天下先夫我有三寳慈故能勇守柔曰强儉故能廣去奢不敢爲天下先故能成器長不敢進寸而退尺今捨慈且勇勇於敢則殺捨儉且廣富貴而驕捨後且先者死矣强梁者不得其死夫慈以戰則勝柔之勝剛以守則固保此道者天將救之以慈衛之天道無親常與善人配天章第六十八善爲士者不武以道佐人生者不以兵强天下善戰者不怒弱之勝强善勝敵者不爭曲則全善用人者爲下大者宜爲下是謂不爭之德弱其志是謂用人之力知人者智是謂配天古之極執古之道玄用章第六十九用兵有言故建言有之吾不敢爲主而爲客知其榮守其辱不敢進寸而退尺捨後且先者死矣是謂行無行攘無臂仍無敵執無兵故善者果而已禍莫大於輕敵名與身孰親輕敵幾喪吾寳咎莫大於欲得故抗兵相加哀者勝矣是以兵强則不勝知難章第七十吾言甚易知甚易行大道甚夷天下莫能知莫能行民之迷言有宗事有君太上下知有之夫唯無知是以不我知自知不自見知我者希多則惑則我者貴道之尊是以聖人被褐懷玉明道若昧知病章第七十一知不知上不自見故明不知知病自見者不明夫唯病病是以不病進道若退聖人不病以其病病是以不病廣德若不足愛己章第七十二民不畏威大威至矣不知常妄作凶無狹其所居虚其心無厭其所生周行而不殆夫唯不厭是以不厭善抱者不脱是以聖人自知不自見夷道若類自愛不自貴上德不德故去彼取此與物反矣任爲章第七十三勇於敢則殺堅强者死之徒勇於不敢則活柔弱者生之徒此兩者或利或害善之與惡天之所惡孰知其故常有司殺者殺是以聖人猶難之唯施是畏天之道不爭而善勝道法自然不言而善應希言自然不召而自來動善時繟然而善謀事善能天網恢恢踈而不失天之所惡孰知其故制惑章第七十四民不畏死奈何以死懼之民不畏威大威至矣若使民常畏死使夫知者不敢爲也而爲竒者自遺其咎吾得執而殺之孰敢勇於敢則殺常有司殺者殺以道范天下夫代司殺者殺是謂代大匠斲不知知病夫代大匠斲者希有不傷乎手矣其事好還貪損章第七十五民之飢以其上食税之多是以飢天下多忌諱而民彌貧民之難治以其上之有爲是以難治法令滋彰盜賊多有民之輕死以其求生之厚是以輕死民之生動入死地夫唯無以生爲者是賢於貴生道常無爲戒强章第七十六人之生也柔弱知和曰常其死也堅强物壯則老萬物草木之生也柔脆和之至也其死也枯槁非道早已故堅强者死之徒强粱者不得其死柔弱者生之徒不敢以取强是以兵强則不勝揣而鋭之不可長保木强則共知止不殆强大處下柔弱處上柔弱勝剛强天道章第七十七天之道其猶張弓乎古之善爲道者高者抑之下者舉之道沖而用之有餘者損之不足者與之是以損之而益益之而損天之道損有餘而補不足虚其心實其腹人之道則不然與物反矣損不足以奉有餘失者同於失孰能有餘以奉天下唯有道者聖人不積既以爲人己愈有是以聖人爲而不恃天地不仁以萬物爲芻狗功成而不處其不欲見賢大成若缺任信章第七十八天下柔弱莫過於水上善若水而攻堅强者莫知能勝柔之勝剛其無以易之天下柔弱莫過於水故柔之勝剛弱之勝强柔弱勝剛强天下莫能知莫能行能無知乎故聖人云受國之垢是謂社稷主知常容容乃公受國之不祥是爲天下王處衆人之所惡故幾於道正言若反玄德深矣遠矣與物反矣任契章第七十九和大怨必有餘怨安可以爲善大小多少報怨以德是以聖人執左契而不責於人聖人不仁以百姓爲芻狗故有德司契道者同於道無德司徹道常無爲天道無親常與善人善者吾善之獨立章第八十小國寡民使有什伯不尚賢使民不爭民之器而不用不貴難得之貨使民重死而不遠徙政善治雖有舟車無所乘之居善地雖有甲兵無所陳之執無兵使民復結繩而用之復歸於朴甘其食美其服安其居樂其俗我無事而民自富鄰國相望雞犬之聲相聞民至老死不相往來不欲以靜天下將自定顯質章第八十一信言不美美言不信信者吾信之不信者吾亦信之善者不辨辨者不善善者吾善之不善者吾亦善之知者不博博者不知少則得多則惑聖人不積既以爲人已愈有常善救人既以與人己愈多常善救物天之道利而不害道之尊聖人之道爲而不爭德之貴道德眞經註卷下
